<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgilePlace Dependency Graph - Standalone</title>
    
    <!-- Load D3.js from CDN -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
            background: #000000;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .stat-item {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            margin-top: 5px;
        }

        .section {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .section-title {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .filter-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-btn {
            background: #2a2a2a;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #333;
        }

        .filter-btn.active {
            background: #0066cc;
            border-color: #0066cc;
        }

        .card-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .card-list-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #2a2a2a;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .card-list-item:hover {
            background: #333;
        }

        .card-list-item.selected {
            background: #1a3a5a;
            border-left-color: #0066cc;
        }

        .card-list-item.blocked {
            border-left-color: #ff4444;
        }

        .card-list-title {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .card-list-meta {
            font-size: 11px;
            color: #999;
        }

        /* Canvas */
        .canvas {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .canvas-header {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .canvas-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .canvas-subtitle {
            font-size: 13px;
            color: #999;
        }

        #graph-container {
            width: 100%;
            height: calc(100vh - 80px);
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* Node Styles */
        .node {
            cursor: move;
        }

        .node:hover .node-circle {
            stroke-width: 3;
            filter: brightness(1.3);
        }

        .node.selected .node-circle {
            stroke-width: 3;
            filter: brightness(1.5);
        }

        .node-circle {
            fill: #1a1a1a;
            stroke: #666;
            stroke-width: 2;
            transition: all 0.2s;
        }

        .node-circle.blocked {
            stroke: #ff4444;
            fill: #1a0000;
        }

        .node-circle.high-priority {
            stroke: #ff6666;
        }

        .node-circle.medium-priority {
            stroke: #ffaa44;
        }

        .node-circle.milestone {
            stroke: #44ff88;
            fill: #001a0a;
        }

        .node-text {
            fill: #ffffff;
            font-size: 11px;
            font-weight: 500;
            pointer-events: none;
            text-anchor: middle;
            user-select: none;
        }

        .node-label {
            fill: #cccccc;
            font-size: 12px;
            font-weight: 600;
            pointer-events: none;
            text-anchor: middle;
            user-select: none;
        }

        /* Edge Styles */
        .edge {
            fill: none;
            stroke-width: 2;
            opacity: 0.6;
        }

        .edge.dependency {
            stroke: #ff4444;
        }

        .edge.parent-child {
            stroke: #666;
            stroke-dasharray: 5,5;
        }

        .edge:hover {
            opacity: 1;
            stroke-width: 3;
        }

        /* Legend */
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 26, 26, 0.95);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 12px;
        }

        .legend-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #fff;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .legend-line {
            width: 30px;
            height: 2px;
        }

        .legend-circle {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid;
        }

        /* Controls */
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            background: rgba(26, 26, 26, 0.95);
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: #333;
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(26, 26, 26, 0.98);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            max-width: 300px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
            font-size: 12px;
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .tooltip-content {
            color: #ccc;
            line-height: 1.5;
        }

        /* Loading State */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #999;
        }

        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #0066cc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #ff4444;
            padding: 20px;
            text-align: center;
        }

        .data-input {
            padding: 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        .data-input textarea {
            width: 100%;
            min-height: 100px;
            background: #2a2a2a;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
        }

        .data-input button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .data-input button:hover {
            background: #0052a3;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Dependency Graph</div>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">Total Cards</div>
                        <div class="stat-value" id="total-cards">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Relationships</div>
                        <div class="stat-value" id="total-edges">0</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Filter by Status</div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All Cards</button>
                    <button class="filter-btn" data-filter="blocked">Blocked Only</button>
                    <button class="filter-btn" data-filter="dependencies">Has Dependencies</button>
                    <button class="filter-btn" data-filter="isolated">No Dependencies</button>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Cards</div>
                <div class="card-list" id="card-list"></div>
            </div>
        </div>

        <!-- Canvas -->
        <div class="canvas">
            <div class="data-input">
                <div style="margin-bottom: 10px; font-weight: 600;">Paste Dependency Graph Data (JSON):</div>
                <textarea id="data-input" placeholder='Paste the JSON response from get_board_dependency_graph here...'></textarea>
                <button onclick="loadDataFromInput()">Load Graph</button>
            </div>

            <div class="canvas-header">
                <div class="canvas-title" id="board-title">AgilePlace Dependency Graph</div>
                <div class="canvas-subtitle" id="board-subtitle">Paste JSON data above to visualize</div>
            </div>

            <div id="graph-container">
                <div class="loading" id="loading">
                    <div>Waiting for data...</div>
                </div>
            </div>

            <!-- Legend -->
            <div class="legend">
                <div class="legend-title">Legend</div>
                <div class="legend-item">
                    <div class="legend-line" style="background: #ff4444;"></div>
                    <span>Dependency (Blocks)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-line" style="background: #666; border-top: 2px dashed #666;"></div>
                    <span>Parent-Child</span>
                </div>
                <div class="legend-item">
                    <div class="legend-circle" style="border-color: #ff4444; background: #1a0000;"></div>
                    <span>Blocked Card</span>
                </div>
                <div class="legend-item">
                    <div class="legend-circle" style="border-color: #44ff88; background: #001a0a;"></div>
                    <span>Milestone</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="control-btn" id="auto-layout" title="Auto Layout">⚡</button>
                <button class="control-btn" id="reset-view" title="Reset View">⟲</button>
                <button class="control-btn" id="zoom-in" title="Zoom In">+</button>
                <button class="control-btn" id="zoom-out" title="Zoom Out">−</button>
            </div>

            <!-- Tooltip -->
            <div class="tooltip" id="tooltip">
                <div class="tooltip-title" id="tooltip-title"></div>
                <div id="tooltip-content"></div>
            </div>
        </div>
    </div>

    <script>
        // Copy the rest of the visualization code from dependency-graph.html
        // but remove MCP App SDK dependencies and add manual data loading
        
        let simulation;
        let graphData = { nodes: [], edges: [] };
        let svg, g, link, node;
        let selectedNode = null;
        let transform = d3.zoomIdentity;

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            const container = document.getElementById('graph-container');
            container.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
        }

        function loadDataFromInput() {
            const input = document.getElementById('data-input');
            const text = input.value.trim();
            
            if (!text) {
                alert('Please paste the JSON data first');
                return;
            }

            try {
                let data = JSON.parse(text);
                
                // Handle MCP tool result format
                if (data.content && Array.isArray(data.content)) {
                    const textContent = data.content.find(c => c.type === 'text');
                    if (textContent && textContent.text) {
                        data = JSON.parse(textContent.text);
                    }
                }
                
                loadGraphData(data);
            } catch (e) {
                alert('Invalid JSON: ' + e.message);
                console.error('Parse error:', e);
            }
        }

        // Load and process graph data
        function loadGraphData(data) {
            console.log('loadGraphData called with:', data);
            
            graphData = {
                nodes: data.nodes || [],
                edges: data.edges || []
            };
            
            console.log(`Loaded ${graphData.nodes.length} nodes and ${graphData.edges.length} edges`);
            
            if (graphData.nodes.length === 0) {
                console.warn('No nodes to render!');
                showError('No cards found in graph data');
                return;
            }
            
            // Update UI
            try {
                updateStats();
                updateCardList();
                renderGraph();
                updateHeader(data);
                
                // Hide loading
                const loadingEl = document.getElementById('loading');
                if (loadingEl) {
                    loadingEl.style.display = 'none';
                }
                
                // Hide data input after successful load
                document.querySelector('.data-input').style.display = 'none';
                
                console.log('Graph rendered successfully');
            } catch (error) {
                console.error('Error rendering graph:', error);
                showError(`Failed to render graph: ${error.message}`);
            }
        }

        // Update statistics
        function updateStats() {
            document.getElementById('total-cards').textContent = graphData.nodes.length;
            document.getElementById('total-edges').textContent = graphData.edges.length;
        }

        // Update header with board info
        function updateHeader(data) {
            const stats = data.statistics || {};
            document.getElementById('board-title').textContent = `Board Dependency Graph`;
            const depsTotal = (stats.dependencies?.total || 0) + (stats.parentChild?.total || 0);
            document.getElementById('board-subtitle').textContent = 
                `${stats.totalCards || 0} cards • ${depsTotal} relationships • ${stats.blockedCards || 0} blocked`;
        }

        // Update card list in sidebar
        function updateCardList() {
            const container = document.getElementById('card-list');
            container.innerHTML = '';
            
            graphData.nodes.forEach(node => {
                const item = document.createElement('div');
                item.className = 'card-list-item';
                if (node.isBlocked) item.classList.add('blocked');
                
                item.innerHTML = `
                    <div class="card-list-title">${escapeHtml(node.title)}</div>
                    <div class="card-list-meta">${node.laneName || 'No lane'} • ${node.priority || 'normal'}</div>
                `;
                
                item.addEventListener('click', () => {
                    selectNodeById(node.id);
                });
                
                container.appendChild(item);
            });
        }

        // Render D3 force-directed graph
        function renderGraph() {
            console.log('renderGraph called');
            const container = document.getElementById('graph-container');
            
            if (!container) {
                console.error('graph-container element not found!');
                showError('Graph container not found');
                return;
            }
            
            const width = container.clientWidth || 800;
            const height = container.clientHeight || 600;
            
            console.log(`Container dimensions: ${width}x${height}`);
            
            if (width === 0 || height === 0) {
                console.warn('Container has zero dimensions, using defaults');
                setTimeout(() => renderGraph(), 100);
                return;
            }
            
            // Check if D3 is available
            if (typeof d3 === 'undefined') {
                console.error('D3.js is not loaded!');
                showError('D3.js library failed to load');
                return;
            }
            
            console.log('D3.js version:', d3.version);
            
            // Clear existing SVG
            d3.select('#graph-container svg').remove();
            
            // Create SVG
            svg = d3.select('#graph-container')
                .append('svg')
                .attr('width', width)
                .attr('height', height);
            
            // Create zoom behavior
            const zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    transform = event.transform;
                    g.attr('transform', transform);
                });
            
            svg.call(zoom);
            
            // Create container group
            g = svg.append('g');
            
            // Define arrow markers
            const defs = svg.append('defs');
            
            defs.append('marker')
                .attr('id', 'arrowhead-dependency')
                .attr('viewBox', '0 0 10 10')
                .attr('refX', 25)
                .attr('refY', 5)
                .attr('markerWidth', 6)
                .attr('markerHeight', 6)
                .attr('orient', 'auto')
                .append('path')
                .attr('d', 'M 0 0 L 10 5 L 0 10 z')
                .attr('fill', '#ff4444');
            
            defs.append('marker')
                .attr('id', 'arrowhead-parent-child')
                .attr('viewBox', '0 0 10 10')
                .attr('refX', 25)
                .attr('refY', 5)
                .attr('markerWidth', 6)
                .attr('markerHeight', 6)
                .attr('orient', 'auto')
                .append('path')
                .attr('d', 'M 0 0 L 10 5 L 0 10 z')
                .attr('fill', '#666');
            
            // Prepare edges with source/target objects
            const edgesWithObjects = graphData.edges.map(e => {
                const sourceId = e.from || e.source?.id || e.source;
                const targetId = e.to || e.target?.id || e.target;
                const sourceNode = graphData.nodes.find(n => 
                    n.id === sourceId || String(n.id) === String(sourceId)
                );
                const targetNode = graphData.nodes.find(n => 
                    n.id === targetId || String(n.id) === String(targetId)
                );
                
                if (!sourceNode || !targetNode) {
                    console.warn(`Edge missing node: from=${sourceId}, to=${targetId}`);
                    return null;
                }
                
                return {
                    ...e,
                    source: sourceNode,
                    target: targetNode
                };
            }).filter(e => e !== null && e.source && e.target);
            
            console.log(`Prepared ${edgesWithObjects.length} edges with node objects`);
            
            // Create force simulation
            simulation = d3.forceSimulation(graphData.nodes)
                .force('link', d3.forceLink(edgesWithObjects)
                    .id(d => d.id)
                    .distance(150))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(50));
            
            // Create links (edges)
            link = g.append('g')
                .selectAll('path')
                .data(edgesWithObjects)
                .join('path')
                .attr('class', d => {
                    const edgeClass = d.type === 'parent' ? 'parent-child' : 'dependency';
                    return `edge ${edgeClass}`;
                })
                .attr('marker-end', d => 
                    d.type === 'parent' ? 'url(#arrowhead-parent-child)' : 'url(#arrowhead-dependency)'
                );
            
            // Create nodes
            node = g.append('g')
                .selectAll('g')
                .data(graphData.nodes)
                .join('g')
                .attr('class', d => {
                    let classes = 'node';
                    if (d.isBlocked) classes += ' blocked';
                    if (d.priority === 'critical' || d.priority === 'high') classes += ' high-priority';
                    if (d.priority === 'medium') classes += ' medium-priority';
                    if (d.cardType === 'Milestone') classes += ' milestone';
                    return classes;
                })
                .call(d3.drag()
                    .on('start', dragStarted)
                    .on('drag', dragged)
                    .on('end', dragEnded));
            
            // Add circles
            node.append('circle')
                .attr('class', d => {
                    let classes = 'node-circle';
                    if (d.isBlocked) classes += ' blocked';
                    if (d.priority === 'critical' || d.priority === 'high') classes += ' high-priority';
                    if (d.priority === 'medium') classes += ' medium-priority';
                    if (d.cardType === 'Milestone') classes += ' milestone';
                    return classes;
                })
                .attr('r', 20);
            
            // Add labels
            node.append('text')
                .attr('class', 'node-label')
                .attr('dy', -25)
                .text(d => {
                    const title = d.title || '';
                    return title.length > 20 ? title.substring(0, 20) + '...' : title;
                });
            
            // Add hover tooltip
            node.on('mouseover', function(event, d) {
                const tooltip = d3.select('#tooltip');
                tooltip
                    .style('left', (event.pageX + 10) + 'px')
                    .style('top', (event.pageY - 10) + 'px')
                    .classed('visible', true);
                
                d3.select('#tooltip-title').text(d.title || 'Untitled');
                
                let content = '';
                if (d.laneName) content += `<div><strong>Lane:</strong> ${escapeHtml(d.laneName)}</div>`;
                if (d.priority) content += `<div><strong>Priority:</strong> ${escapeHtml(d.priority)}</div>`;
                if (d.isBlocked) content += `<div style="color: #ff4444;"><strong>BLOCKED:</strong> ${escapeHtml(d.blockReason || 'Unknown reason')}</div>`;
                if (d.description) {
                    const desc = d.description.substring(0, 200);
                    content += `<div style="margin-top: 8px;"><strong>Description:</strong> ${escapeHtml(desc)}${d.description.length > 200 ? '...' : ''}</div>`;
                }
                
                d3.select('#tooltip-content').html(content);
            })
            .on('mouseout', function() {
                d3.select('#tooltip').classed('visible', false);
            });
            
            // Update positions on simulation tick
            simulation.on('tick', () => {
                link.attr('d', d => {
                    if (!d.source || !d.target || d.source.x === undefined || d.target.x === undefined) {
                        return '';
                    }
                    const dx = d.target.x - d.source.x;
                    const dy = d.target.y - d.source.y;
                    const dr = Math.sqrt(dx * dx + dy * dy);
                    return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
                });
                
                node.attr('transform', d => {
                    if (d.x === undefined || d.y === undefined) {
                        return 'translate(0,0)';
                    }
                    return `translate(${d.x},${d.y})`;
                });
            });
            
            // Start the simulation
            console.log('Starting D3 force simulation...');
            simulation.alpha(1).restart();
        }

        function dragStarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragEnded(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        function selectNodeById(nodeId) {
            selectedNode = graphData.nodes.find(n => n.id === nodeId || String(n.id) === String(nodeId));
            
            // Update UI
            d3.selectAll('.card-list-item').classed('selected', false);
            d3.selectAll('.card-list-item').each(function(d) {
                if (this.__data__ && (this.__data__.id === nodeId || String(this.__data__.id) === String(nodeId))) {
                    d3.select(this).classed('selected', true);
                }
            });
            
            // Center on node
            if (selectedNode && selectedNode.x !== undefined && selectedNode.y !== undefined) {
                const container = document.getElementById('graph-container');
                const width = container.clientWidth;
                const height = container.clientHeight;
                
                transform = d3.zoomIdentity
                    .translate(width / 2 - selectedNode.x, height / 2 - selectedNode.y)
                    .scale(1.5);
                
                g.transition()
                    .duration(750)
                    .attr('transform', transform);
            }
        }

        // Filter handlers
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const filter = this.dataset.filter;
                applyFilter(filter);
            });
        });

        function applyFilter(filter) {
            if (!node || !link) return;
            
            if (filter === 'all') {
                node.style('opacity', 1);
                link.style('opacity', 0.6);
            } else if (filter === 'blocked') {
                node.style('opacity', d => d.isBlocked ? 1 : 0.2);
                link.style('opacity', 0.2);
            } else if (filter === 'dependencies') {
                const connectedNodes = new Set();
                graphData.edges.forEach(e => {
                    const sourceId = e.source?.id || e.source || e.from;
                    const targetId = e.target?.id || e.target || e.to;
                    connectedNodes.add(sourceId);
                    connectedNodes.add(targetId);
                });
                node.style('opacity', d => connectedNodes.has(d.id) ? 1 : 0.2);
                link.style('opacity', 1);
            } else if (filter === 'isolated') {
                const connected = new Set();
                graphData.edges.forEach(e => {
                    const sourceId = e.source?.id || e.source || e.from;
                    const targetId = e.target?.id || e.target || e.to;
                    connected.add(sourceId);
                    connected.add(targetId);
                });
                node.style('opacity', d => !connected.has(d.id) ? 1 : 0.2);
                link.style('opacity', 0.2);
            }
        }

        // Control handlers
        document.getElementById('auto-layout').addEventListener('click', () => {
            simulation.alpha(1).restart();
        });

        document.getElementById('reset-view').addEventListener('click', () => {
            transform = d3.zoomIdentity;
            g.transition()
                .duration(750)
                .attr('transform', transform);
            svg.call(d3.zoom().transform, transform);
        });

        document.getElementById('zoom-in').addEventListener('click', () => {
            transform = transform.scale(transform.k * 1.2);
            g.attr('transform', transform);
            svg.call(d3.zoom().transform, transform);
        });

        document.getElementById('zoom-out').addEventListener('click', () => {
            transform = transform.scale(transform.k / 1.2);
            g.attr('transform', transform);
            svg.call(d3.zoom().transform, transform);
        });

        // Check for embedded data or URL hash
        window.addEventListener('load', () => {
            // First check for embedded data
            if (window.embeddedGraphData) {
                setTimeout(() => {
                    loadGraphData(window.embeddedGraphData);
                }, 100);
                return;
            }
            
            // Then check URL hash
            const hash = window.location.hash.substring(1);
            if (hash) {
                try {
                    const data = JSON.parse(decodeURIComponent(hash));
                    loadGraphData(data);
                } catch (e) {
                    console.log('No valid data in URL hash');
                }
            }
        });
    </script>
</body>
</html>
